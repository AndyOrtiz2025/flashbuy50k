# k8s/kafka/kafka-init-topics.yml
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topics
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo "Esperando Kafka..."; sleep 3; done']
      containers:
        - name: kafka-init
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/bash
            - -c
            - |
              # Topics principales (6 particiones para alta concurrencia)
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.created --partitions 6 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stock.reserved --partitions 6 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stock.reservation.failed --partitions 6 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.completed --partitions 6 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.failed --partitions 6 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.send --partitions 3 --replication-factor 1

              # Dead Letter Queues (1 partición cada una)
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order.created.DLQ --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stock.reserved.DLQ --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stock.reservation.failed.DLQ --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.completed.DLQ --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.failed.DLQ --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.send.DLQ --partitions 1 --replication-factor 1

              echo "✅ Los 12 topics fueron creados correctamente"
              kafka-topics --bootstrap-server kafka:9092 --list