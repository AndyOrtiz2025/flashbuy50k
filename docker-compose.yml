services:

  catalog-db:
    image: postgres:15
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5432:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
      - ./catalog-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  cart-db:
    image: postgres:15
    container_name: cart-db
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5433:5432"
    volumes:
      - cart-db-data:/var/lib/postgresql/data
      - ./cart-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5434:5432"

  catalog-service:
    build:
      context: ./catalog-service
    container_name: catalog-service
    ports:
      - "8082:8082"
    depends_on:
      - catalog-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/catalog_db
      SPRING_DATASOURCE_USERNAME: flashbuy
      SPRING_DATASOURCE_PASSWORD: flashbuy123

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8084:8084"
    depends_on:
      - order-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: flashbuy
      SPRING_DATASOURCE_PASSWORD: flashbuy123

    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  inventory-db:
    image: postgres:15
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
      - ./inventory-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  payment-db:
    image: postgres:15
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5436:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  notification-db:
    image: postgres:15
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5437:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
      - ./notification-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis-inventory:
    image: redis:7
    container_name: redis-inventory
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=flashbuy123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  catalog-db-data:
  cart-db-data:
  order-db-data:
  inventory-db-data:
  payment-db-data:
  notification-db-data:
  grafana-data:
  