version: '3.8'

services:

  catalog-db:
    image: postgres:15
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5432:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
      - ./catalog-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  cart-db:
    image: postgres:15
    container_name: cart-db
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5433:5432"
    volumes:
      - cart-db-data:/var/lib/postgresql/data
      - ./cart-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  inventory-db:
    image: postgres:15
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
      - ./inventory-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  payment-db:
    image: postgres:15
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5436:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  notification-db:
    image: postgres:15
    container_name: notification-db
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: flashbuy
      POSTGRES_PASSWORD: flashbuy123
    ports:
      - "5437:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
      - ./notification-service/init.sql:/docker-entrypoint-initdb.d/init.sql

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

volumes:
  catalog-db-data:
  cart-db-data:
  order-db-data:
  inventory-db-data:
  payment-db-data:
  notification-db-data: